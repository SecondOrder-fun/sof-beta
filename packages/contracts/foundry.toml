[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
script = 'script'
via_ir = true
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
cbor_metadata = false
# Exclude old Solidity 0.5.x libraries that are incompatible with our 0.8.20+ contracts
exclude = ['lib/conditional-tokens-market-makers/**', 'lib/conditional-tokens-contracts/**']
# Skip fork tests that require --fork-url (InfoFiFPMMForkTest)
no_match_contract = "ForkTest"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[lint]
# Suppress style-only lints (naming conventions, import style, gas micro-optimizations).
# Keep enabled: erc20-unchecked-transfer, unsafe-typecast, incorrect-shift, unused-import.
exclude_lints = [
  "unaliased-plain-import",
  "mixed-case-variable",
  "mixed-case-function",
  "screaming-snake-case-immutable",
  "pascal-case-struct",
  "asm-keccak256",
  "unsafe-cheatcode",
]

[fmt]
line_length = 120

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
base = "https://mainnet.base.org"
baseSepolia = "https://sepolia.base.org"
polygon = "https://polygon-rpc.com"
arbitrum = "https://arb1.arbitrum.io/rpc"
optimism = "https://mainnet.optimism.io"
ethereum = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}" }
baseSepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
polygon = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
optimism = { key = "${ETHERSCAN_API_KEY}" }
ethereum = { key = "${ETHERSCAN_API_KEY}" }
