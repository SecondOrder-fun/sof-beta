# PR Preview Pairing
#
# Pairs Vercel's auto-generated Preview deployment with Railway's auto-created
# PR environment so each PR gets a paired backend.
#
# This workflow is intentionally MINIMAL because both providers do most of the
# work natively. It only fills the gap between them — pointing Vercel's
# preview build at Railway's PR-env backend URL.
#
# Provider responsibilities:
#
#   Railway: with prDeploys=true on the project (Project Settings → "PR
#     Environments"), Railway auto-creates a `pr-N` environment when a PR
#     opens, deploys the PR branch into it, and deletes it on PR close.
#     With focusedPrEnvironments=true, only services whose watchPatterns
#     match the PR's changed files actually get deployed — so a frontend-
#     only PR will NOT spin up a backend preview, which is correct.
#     Source: https://docs.railway.com/reference/environments#pr-environments
#
#   Vercel: the Git integration auto-creates a Preview deployment for each
#     PR. Branch-scoped Preview env vars override generic Preview vars on
#     that branch only.
#     Source: https://vercel.com/docs/projects/environment-variables#preview-environment-variables
#
#   This workflow: poll for Railway's auto-created `pr-N` env + its service
#     domain, then push branch-scoped Vercel env vars pointing at it, then
#     redeploy the existing Vercel preview so it picks up those vars (env-
#     var changes do not retroactively apply to in-flight builds).
#
# Required GitHub Actions secrets:
#   RAILWAY_TOKEN         project token from Project Settings → Tokens
#                         (sufficient for read queries; no environmentCreate
#                          or environmentDelete needed)
#   RAILWAY_PROJECT_ID
#   RAILWAY_SERVICE_ID    backend service id
#   VERCEL_TOKEN
#   VERCEL_PROJECT_ID
#   VERCEL_TEAM_ID

name: PR Preview Pairing

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-pairing-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pair-or-cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      ENV_NAME: pr-${{ github.event.pull_request.number }}
      RAILWAY_GRAPHQL: https://backboard.railway.com/graphql/v2
    steps:
      - name: Verify required secrets
        run: |
          missing=()
          [ -z "$RAILWAY_TOKEN" ]      && missing+=(RAILWAY_TOKEN)
          [ -z "$RAILWAY_PROJECT_ID" ] && missing+=(RAILWAY_PROJECT_ID)
          [ -z "$RAILWAY_SERVICE_ID" ] && missing+=(RAILWAY_SERVICE_ID)
          [ -z "$VERCEL_TOKEN" ]       && missing+=(VERCEL_TOKEN)
          [ -z "$VERCEL_PROJECT_ID" ]  && missing+=(VERCEL_PROJECT_ID)
          [ -z "$VERCEL_TEAM_ID" ]     && missing+=(VERCEL_TEAM_ID)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────
      # PR opened / synchronize / reopened: pair Vercel preview to Railway PR env
      # ─────────────────────────────────────────────────────────────────

      - name: Wait for Railway PR env + service domain
        if: github.event.action != 'closed'
        id: railway-domain
        run: |
          # Railway auto-creates the env (prDeploys=true). With
          # focusedPrEnvironments=true it only deploys services whose
          # watchPatterns match changed files — so a PR that touches only
          # the frontend won't get a backend env, and we exit gracefully
          # in that case (Vercel preview falls back to its generic preview
          # env vars, which already point at production).
          domain=""
          env_id=""
          for i in $(seq 1 30); do
            envs=$(curl -sf -X POST "$RAILWAY_GRAPHQL" \
              -H "Project-Access-Token: $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg q 'query($pid:String!){project(id:$pid){environments{edges{node{id name}}}}}' \
                --arg pid "$RAILWAY_PROJECT_ID" \
                '{query:$q,variables:{pid:$pid}}')" || echo '{}')
            env_id=$(echo "$envs" | jq -r --arg n "$ENV_NAME" \
              '[.data.project.environments.edges[] | select(.node.name == $n)] | first | .node.id // empty')
            if [ -n "$env_id" ]; then
              dresp=$(curl -sf -X POST "$RAILWAY_GRAPHQL" \
                -H "Project-Access-Token: $RAILWAY_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg q 'query($pid:String!,$eid:String!,$sid:String!){domains(projectId:$pid,environmentId:$eid,serviceId:$sid){serviceDomains{domain}}}' \
                  --arg pid "$RAILWAY_PROJECT_ID" \
                  --arg eid "$env_id" \
                  --arg sid "$RAILWAY_SERVICE_ID" \
                  '{query:$q,variables:{pid:$pid,eid:$eid,sid:$sid}}')" || echo '{}')
              domain=$(echo "$dresp" | jq -r '.data.domains.serviceDomains[0].domain // empty')
              if [ -n "$domain" ]; then
                break
              fi
            fi
            echo "Attempt $i/30 — waiting for $ENV_NAME (env_id=${env_id:-none}, domain=${domain:-none})..."
            sleep 10
          done
          if [ -z "$domain" ]; then
            echo "::warning::Railway $ENV_NAME env or its service domain not found after 5 min."
            echo "::warning::Likely a frontend-only PR (focusedPrEnvironments skipped backend)."
            echo "::warning::Vercel preview will use generic preview env vars; no pairing needed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "domain=$domain" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Railway domain: $domain"

      - name: Push branch-scoped Vercel env vars
        if: github.event.action != 'closed' && steps.railway-domain.outputs.skip != 'true'
        env:
          DOMAIN: ${{ steps.railway-domain.outputs.domain }}
        run: |
          # `vercel env add KEY preview <branch>` creates a branch-scoped row
          # that overrides the generic preview value on that branch only.
          # Source: https://vercel.com/docs/cli/env
          # rm-then-add makes re-runs idempotent (vercel env add fails on
          # existing keys).
          push_var() {
            local key="$1" value="$2"
            npx -y vercel@latest env rm "$key" preview "$PR_BRANCH" \
              --token "$VERCEL_TOKEN" --scope "$VERCEL_TEAM_ID" --yes 2>/dev/null || true
            npx -y vercel@latest env add "$key" preview "$PR_BRANCH" \
              --token "$VERCEL_TOKEN" --scope "$VERCEL_TEAM_ID" <<< "$value"
          }
          push_var VITE_API_BASE_URL  "https://${DOMAIN}/api"
          push_var VITE_BACKEND_WS_URL "wss://${DOMAIN}"

      - name: Redeploy Vercel preview to apply new env vars
        if: github.event.action != 'closed' && steps.railway-domain.outputs.skip != 'true'
        run: |
          # env-var changes do not apply to in-flight builds, so we trigger
          # a redeploy of the latest preview deployment for this branch.
          # CLI list lacks branch filter, so use REST API.
          deployments=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=preview&limit=20&teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          deploy_url=$(echo "$deployments" | jq -r --arg b "$PR_BRANCH" \
            '[.deployments[] | select(.meta.githubCommitRef == $b)] | first | .url // empty')
          if [ -z "$deploy_url" ]; then
            echo "::warning::No preview for $PR_BRANCH yet; first build will use the branch-scoped vars natively."
            exit 0
          fi
          echo "Redeploying https://${deploy_url}"
          npx -y vercel@latest redeploy "https://${deploy_url}" \
            --token "$VERCEL_TOKEN" --scope "$VERCEL_TEAM_ID"

      - name: Comment paired URLs on PR
        if: github.event.action != 'closed' && steps.railway-domain.outputs.skip != 'true'
        env:
          DOMAIN: ${{ steps.railway-domain.outputs.domain }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "**PR previews paired**

          - 🚂 Backend: https://${DOMAIN}/api
          - 🔼 Frontend: see the Vercel preview URL above

          Backend env auto-managed by Railway PR Environments. Both will be torn down on PR close."

      # ─────────────────────────────────────────────────────────────────
      # PR closed: remove branch-scoped Vercel vars (Railway self-cleans)
      # ─────────────────────────────────────────────────────────────────

      - name: Remove branch-scoped Vercel env vars
        if: github.event.action == 'closed'
        run: |
          for key in VITE_API_BASE_URL VITE_BACKEND_WS_URL; do
            npx -y vercel@latest env rm "$key" preview "$PR_BRANCH" \
              --token "$VERCEL_TOKEN" --scope "$VERCEL_TEAM_ID" --yes 2>&1 || \
              echo "::warning::Failed to remove $key on $PR_BRANCH (may not exist)"
          done
