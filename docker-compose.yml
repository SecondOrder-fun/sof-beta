# Local development services for SecondOrder.fun
# Usage:
#   docker compose up -d            # Start all services (Anvil, Redis, Postgres, Backend)
#   npm run dev                     # Start frontend only (connects to Docker backend)
#   docker compose down -v          # Stop and clean up (Anvil state deleted)
#   docker compose logs backend -f  # Tail backend logs

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "8545:8545"
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "1"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    tmpfs:
      - /tmp/anvil:size=512M
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sof_local
    volumes:
      - ./docker/supabase/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: ["sh", "scripts/docker-backend-start.sh"]
    environment:
      NETWORK: LOCAL
      PORT: "3000"
      NODE_ENV: development
      RPC_URL: http://anvil:8545
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ""
      SUPABASE_DB_URL: postgresql://postgres:postgres@postgres:5432/sof_local
      SUPABASE_ANON_KEY: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      BACKEND_WALLET_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BACKEND_WALLET_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      JWT_SECRET: local-dev-jwt-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: "http://localhost:5174,http://127.0.0.1:5174"
      SIWF_ALLOWED_DOMAINS: "localhost,127.0.0.1"
    depends_on:
      anvil:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
