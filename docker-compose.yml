# Local development infrastructure for SecondOrder.fun.
#
# Scope: services that mirror the testnet/prod architecture.
#   - anvil:           local L2 (replaces Base on testnet/mainnet)
#   - redis:           cache + paymaster session store (mirrors Railway/Upstash)
#   - deploy-contracts: one-shot Foundry deploy (no equivalent in prod — runs once
#                       per fresh Anvil; on testnet/mainnet you run forge from
#                       the host with the testnet RPC instead)
#
# What is NOT here:
#   - postgres: in prod we use the Supabase project's managed postgres. Locally
#               that role is filled by the supabase CLI (`supabase start`),
#               which runs its own postgres on port 54322 and exposes the REST
#               API on 54321. The backend talks to supabase via REST + service-
#               role key, not via direct postgres URL.
#   - backend:  in prod the backend runs as a node process on Railway. Locally
#               we run it the same way via scripts/local-dev.sh (step 8) so the
#               execution shape stays identical to prod. A docker `backend`
#               service was previously stubbed here but never worked (no
#               node_modules in the image) — removed for clarity.
#
# Usage:
#   ./scripts/local-dev.sh              # full stack up (compose + supabase + backend + frontend)
#   docker compose down -v              # tear down compose layer only
#
# To bring up just the chain layer for a quick smoke:
#   docker compose up -d anvil redis    # then `node scripts/setup-local-aa.js` to inject EntryPoint v0.8

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "8545:8545"
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--chain-id"
      - "31337"
      - "--hardfork"
      - "prague"
      - "--block-time"
      - "1"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
    tmpfs:
      - /tmp/anvil:size=512M
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  deploy-contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    volumes:
      - .:/app
    working_dir: /app/packages/contracts
    entrypoint: ["sh", "-c"]
    # --slow forces one tx per block. Without it the batched broadcast stalls
    # mid-deploy on local Anvil (deployer nonce 29 of 43; receipt-poller hangs
    # forever). Same flag the testnet deploy uses for delegated EOAs — it makes
    # both paths share a single command shape.
    command:
      - |
        echo "[deploy] Building contracts..."
        forge build --force && \
        echo "[deploy] Deploying contracts to Anvil..."
        PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
        TREASURY_ADDRESS=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
        forge script script/deploy/DeployAll.s.sol:DeployAll \
          --rpc-url http://anvil:8545 \
          --broadcast \
          --slow \
          --force && \
        echo "[deploy] Contracts deployed successfully" || \
        echo "[deploy] WARNING: Contract deployment failed"
    depends_on:
      anvil:
        condition: service_healthy
